name: Deploy Documentation to GitHub Pages

on:
  push:
    branches: [ft/v2.0]
    paths:
        - 'docs/**'
        - '.github/workflows/docs.yml'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install V1 dependencies
        working-directory: docs/v1
        run: yarn install --frozen-lockfile

      - name: Build V1
        working-directory: docs/v1
        run: yarn build

      - name: Install V2 dependencies
        working-directory: docs/v2
        run: yarn install --frozen-lockfile

      - name: Build V2
        working-directory: docs/v2
        run: yarn docs:build

      - name: Merge V1 and V2 builds
        run: |
          mkdir -p docs/v1/.vitepress/dist/v2
          cp -r docs/v2/.vitepress/dist/* docs/v1/.vitepress/dist/v2/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/v1/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
