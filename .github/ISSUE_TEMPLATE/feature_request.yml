name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What do you want?
      description: Short summary of the feature.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Why do you need it?
      description: What problem does this solve, or what use case does it cover?
      placeholder: Right now I have to do X manually, which is tedious because...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: How should it work?
      description: Describe your ideal solution. Config examples, expected behavior, CLI flags, whatever helps explain it.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
      description: Have you tried workarounds or other tools? What fell short?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
    validations:
      required: false
